<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional English Conversation</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    body { 
      background: var(--bg); 
      color: var(--text-main); 
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 16px;
    }

    .app-container { width: 100%; max-width: 500px; }

    .card, .chat-window {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .card-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .card-body { padding: 24px; }
    
    /* Control Groups */
    .control-group { margin-bottom: 15px; }
    label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 5px; }
    input[type="range"] { width: 100%; cursor: pointer; }
    
    button { padding: 12px 24px; border-radius: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
    button.primary { background: var(--primary); color: white; width: 100%; }
    button.primary:hover { background: var(--primary-hover); }
    button.outline { background: #f1f5f9; color: var(--text-main); }
    
    .info-box { background: #eef2ff; color: var(--primary); padding: 15px; border-radius: 14px; font-size: 0.85rem; font-weight: 500; margin-top: 15px; text-align: center; line-height: 1.4; }
    
    .bubbles-area { padding: 24px; display: flex; flex-direction: column; gap: 20px; min-height: 250px; }
    .bubble-text { max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 1rem; }
    .bubble-them { background: #f1f5f9; border-bottom-left-radius: 4px; align-self: flex-start; }
    .bubble-me { background: var(--primary); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
    
    .translation { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 8px; }
    .speaker-btn { background: #e2e8f0; border-radius: 50%; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
    
    .nav-bottom { padding: 20px; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .slide { display: none; }
    .active-slide { display: block; }
  </style>
</head>
<body>

<div class="app-container">
  <div id="slideSetup" class="slide active-slide">
    <div class="card">
      <div class="card-header">
        <h2>3 bulan bisa bicara B Inggris</h2>
        <p>Atur kecepatan dan volume suara Anda.</p>
      </div>
      <div class="card-body">
        <div class="control-group">
          <label>Kecepatan Suara</label>
          <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
          <label>Volume Suara (Max 300%)</label>
          <input type="range" id="volumeRange" min="0.1" max="3" step="0.1" value="1">
        </div>
        
        <div class="info-box">
          Jawablah dengan B inggris, bicara bahasa inggris gak harus nunggu sempurna.
        </div>
        
        <button class="primary" style="margin-top: 20px;" id="startBtn">Mulai Latihan</button>
      </div>
    </div>
  </div>

  <div id="slideChat" class="slide">
    <div class="chat-window">
      <div class="card-header" style="display:flex; justify-content: space-between; align-items: center;">
        <div><h2 id="partnerName">Selesaikan</h2><p id="sessionCounter">Sesi 1 / 100</p></div>
        <button class="outline" onclick="location.reload()">Exit</button>
      </div>

      <div class="bubbles-area">
        <div class="bubble-them">
          <div class="bubble-text" id="partnerMsg">...</div>
        </div>
        <div class="translation">
          <button class="speaker-btn" id="speakPartner">🔊</button>
          <span id="partnerTrans">...</span>
        </div>

        <div class="bubble-me">
          <div class="bubble-text" id="userMsg">❓ ❓ ❓</div>
        </div>
        <div class="translation" style="justify-content: flex-end;">
          <span id="userTrans" style="font-style: italic;"></span>
        </div>
      </div>

      <div class="nav-bottom">
        <button id="prevBtn" class="outline">Prev</button>
        <button id="revealBtn" class="outline">Lihat Jawaban</button>
        <button id="nextBtn" class="primary" style="width: auto;">Next</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ===[MULAI TANDA] TAMBAHKAN PERCAKAPAN ANDA DI BAWAH INI ===
  const DIALOGS =const greetings = const hobbyMusicSeries = [
  { pEn: () => `What do you usually do for fun?`, pId: () => `Kamu biasanya ngapain buat seru-seruan?`, aEn: () => `I usually watch movies.`, aId: () => `Aku biasanya nonton film.` },
  { pEn: () => `What's your hobby?`, pId: () => `Apa hobimu?`, aEn: () => `I like gaming.`, aId: () => `Aku suka main game.` },
  { pEn: () => `Do you play games often?`, pId: () => `Kamu sering main game?`, aEn: () => `Yeah, almost every day.`, aId: () => `Ya, hampir tiap hari.` },
  { pEn: () => `What games do you play?`, pId: () => `Game apa yang kamu mainkan?`, aEn: () => `Mostly mobile games.`, aId: () => `Kebanyakan game mobile.` },
  { pEn: () => `Do you like listening to music?`, pId: () => `Kamu suka dengerin musik?`, aEn: () => `Yes, all the time.`, aId: () => `Ya, terus-terusan.` },
  { pEn: () => `What kind of music do you like?`, pId: () => `Kamu suka musik jenis apa?`, aEn: () => `I like pop music.`, aId: () => `Aku suka musik pop.` },
  { pEn: () => `Who's your favorite singer?`, pId: () => `Siapa penyanyi favoritmu?`, aEn: () => `Taylor Swift.`, aId: () => `Taylor Swift.` },
  { pEn: () => `Do you like K-pop?`, pId: () => `Kamu suka K-pop?`, aEn: () => `Yeah, a little.`, aId: () => `Ya, sedikit.` },
  { pEn: () => `What's your favorite song right now?`, pId: () => `Lagu favoritmu sekarang apa?`, aEn: () => `I really like that new song.`, aId: () => `Aku suka lagu baru itu.` },
  { pEn: () => `Do you watch movies often?`, pId: () => `Kamu sering nonton film?`, aEn: () => `Yes, every weekend.`, aId: () => `Ya, tiap akhir pekan.` },

  { pEn: () => `What's your favorite movie?`, pId: () => `Film favoritmu apa?`, aEn: () => `Interstellar.`, aId: () => `Interstellar.` },
  { pEn: () => `Do you like horror movies?`, pId: () => `Kamu suka film horor?`, aEn: () => `Not really haha.`, aId: () => `Tidak terlalu haha.` },
  { pEn: () => `Do you watch Netflix?`, pId: () => `Kamu nonton Netflix?`, aEn: () => `Yeah, almost every day.`, aId: () => `Ya, hampir tiap hari.` },
  { pEn: () => `What's your favorite series?`, pId: () => `Series favoritmu apa?`, aEn: () => `Stranger Things.`, aId: () => `Stranger Things.` },
  { pEn: () => `Have you watched Stranger Things?`, pId: () => `Kamu sudah nonton Stranger Things?`, aEn: () => `Yes, it's amazing.`, aId: () => `Ya, keren banget.` },
  { pEn: () => `Do you prefer movies or series?`, pId: () => `Kamu lebih suka film atau series?`, aEn: () => `Series because they're longer.`, aId: () => `Series karena lebih panjang.` },
  { pEn: () => `What genre do you like most?`, pId: () => `Genre favoritmu apa?`, aEn: () => `Comedy and romance.`, aId: () => `Komedi dan romance.` },
  { pEn: () => `Do you like anime?`, pId: () => `Kamu suka anime?`, aEn: () => `Yes, a lot.`, aId: () => `Ya, banget.` },
  { pEn: () => `What's your favorite anime?`, pId: () => `Anime favoritmu apa?`, aEn: () => `Attack on Titan.`, aId: () => `Attack on Titan.` },
  { pEn: () => `Do you watch YouTube a lot?`, pId: () => `Kamu sering nonton YouTube?`, aEn: () => `Yeah, every day.`, aId: () => `Ya, tiap hari.` },

  { pEn: () => `What YouTubers do you watch?`, pId: () => `YouTuber apa yang kamu tonton?`, aEn: () => `Mostly gaming channels.`, aId: () => `Kebanyakan channel game.` },
  { pEn: () => `Do you listen to music while studying?`, pId: () => `Kamu dengerin musik saat belajar?`, aEn: () => `Yes, it helps me focus.`, aId: () => `Ya, bikin fokus.` },
  { pEn: () => `Do you play any instruments?`, pId: () => `Kamu main alat musik?`, aEn: () => `A little guitar.`, aId: () => `Sedikit gitar.` },
  { pEn: () => `Can you sing?`, pId: () => `Kamu bisa nyanyi?`, aEn: () => `Not really haha.`, aId: () => `Tidak terlalu haha.` },
  { pEn: () => `What do you do when you're bored?`, pId: () => `Kamu ngapain kalau bosan?`, aEn: () => `I watch TikTok.`, aId: () => `Aku nonton TikTok.` },
  { pEn: () => `Do you like photography?`, pId: () => `Kamu suka fotografi?`, aEn: () => `Yeah, it's fun.`, aId: () => `Ya, seru.` },
  { pEn: () => `Do you enjoy drawing?`, pId: () => `Kamu suka menggambar?`, aEn: () => `Sometimes.`, aId: () => `Kadang.` },
  { pEn: () => `What's your favorite band?`, pId: () => `Band favoritmu apa?`, aEn: () => `Coldplay.`, aId: () => `Coldplay.` },
  { pEn: () => `Do you like sad songs?`, pId: () => `Kamu suka lagu sedih?`, aEn: () => `Yeah, at night haha.`, aId: () => `Ya, kalau malam haha.` },
  { pEn: () => `Do you use Spotify?`, pId: () => `Kamu pakai Spotify?`, aEn: () => `Yes, every day.`, aId: () => `Ya, tiap hari.` },

  { pEn: () => `What's your Spotify playlist like?`, pId: () => `Playlist Spotify kamu isinya apa?`, aEn: () => `Mostly chill songs.`, aId: () => `Kebanyakan lagu santai.` },
  { pEn: () => `Do you prefer English songs or local songs?`, pId: () => `Kamu lebih suka lagu Inggris atau lagu lokal?`, aEn: () => `English songs mostly.`, aId: () => `Kebanyakan lagu Inggris.` },
  { pEn: () => `Have you been to a concert?`, pId: () => `Kamu pernah ke konser?`, aEn: () => `Not yet sadly.`, aId: () => `Belum sayangnya.` },
  { pEn: () => `What's the last movie you watched?`, pId: () => `Film terakhir yang kamu tonton apa?`, aEn: () => `A horror movie.`, aId: () => `Film horor.` },
  { pEn: () => `Do you cry when watching sad movies?`, pId: () => `Kamu nangis kalau nonton film sedih?`, aEn: () => `Sometimes haha.`, aId: () => `Kadang haha.` },
  { pEn: () => `What's your comfort movie?`, pId: () => `Film ternyaman buatmu apa?`, aEn: () => `Harry Potter.`, aId: () => `Harry Potter.` },
  { pEn: () => `Do you binge-watch series?`, pId: () => `Kamu suka marathon series?`, aEn: () => `Yes, all night sometimes.`, aId: () => `Ya, kadang semalaman.` },
  { pEn: () => `Which series character do you like most?`, pId: () => `Karakter series favoritmu siapa?`, aEn: () => `Wednesday Addams.`, aId: () => `Wednesday Addams.` },
  { pEn: () => `Do you like action movies?`, pId: () => `Kamu suka film action?`, aEn: () => `Yes, they're exciting.`, aId: () => `Ya, seru.` },
  { pEn: () => `Do you watch movies alone or with friends?`, pId: () => `Kamu nonton film sendiri atau sama teman?`, aEn: () => `Usually alone.`, aId: () => `Biasanya sendiri.` }
];
  // ===[AKHIR TANDA] ===

  let current = 0;
  let voices =[];

  window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); };

  function speak(text, isPartner = true) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const voice = voices.find(v => v.lang.includes('en-US')) || voices[0];
    if (voice) utter.voice = voice;
    
    // Ambil nilai dari slider
    utter.rate = parseFloat(document.getElementById('rateRange').value);
    utter.volume = parseFloat(document.getElementById('volumeRange').value);
    
    utter.pitch = isPartner ? 1.0 : 1.2;
    window.speechSynthesis.speak(utter);
  }

  function update() {
    const d = DIALOGS[current];
    document.getElementById('partnerMsg').textContent = d.pEn();
    document.getElementById('partnerTrans').textContent = d.pId();
    document.getElementById('userMsg').textContent = "❓ ❓ ❓";
    document.getElementById('userTrans').textContent = "";
    document.getElementById('sessionCounter').textContent = `Sesi ${current + 1} / ${DIALOGS.length}`;
  }

  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('slideSetup').classList.remove('active-slide');
    document.getElementById('slideChat').classList.add('active-slide');
    update();
    setTimeout(() => speak(DIALOGS[current].pEn()), 500);
  });

  document.getElementById('speakPartner').addEventListener('click', () => speak(DIALOGS[current].pEn()));

  document.getElementById('revealBtn').addEventListener('click', () => {
    const d = DIALOGS[current];
    document.getElementById('userMsg').textContent = d.aEn();
    document.getElementById('userTrans').textContent = d.aId();
    speak(d.aEn(), false);
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if(current < DIALOGS.length - 1) { current++; update(); speak(DIALOGS[current].pEn()); }
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    if(current > 0) { current--; update(); speak(DIALOGS[current].pEn()); }
  });
</script>
</body>
</html>
