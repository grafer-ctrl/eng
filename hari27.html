<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Latihan Bicara Ala Ome TV</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:550px;
  background:#111827;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.header{
  background:#1e293b;
  padding:20px;
  text-align:center;
}

.header h1{
  font-size:26px;
}

.header p{
  color:#94a3b8;
  margin-top:5px;
}

.chat{
  height:500px;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.message{
  max-width:85%;
  padding:15px;
  border-radius:18px;
  line-height:1.5;
  animation:fade .3s ease;
}

.ai{
  align-self:flex-start;
  background:#2563eb;
}

.user{
  align-self:flex-end;
  background:#374151;
}

.translation{
  margin-top:8px;
  font-size:13px;
  color:#d1d5db;
}

.answer-box{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  font-size:14px;
}

.answer-title{
  color:#facc15;
  margin-bottom:5px;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.bottom{
  background:#1e293b;
  padding:20px;
}

.status{
  text-align:center;
  margin-bottom:15px;
  color:#facc15;
}

.mic-area{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.mic{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#3b82f6;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
}

.mic.active{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(59,130,246,.7);
  }

  70%{
    transform:scale(1.1);
    box-shadow:0 0 0 30px rgba(59,130,246,0);
  }

  100%{
    transform:scale(1);
  }
}

.result{
  text-align:center;
  min-height:40px;
  margin-bottom:15px;
}

.score{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:20px;
}

.controls{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:15px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-size:15px;
}

.next-btn{
  background:#22c55e;
}

.show-btn{
  background:#f59e0b;
}

</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>Latihan Bicara Ala Ome Tv</h1>
    <p>Practice Real English Conversation, Jawab dengan B Inggris Tanpa Takut Salah, jawab dengan speaker, audio anda akan di evaluasi oleh sistem</p>
  </div>

  <div class="chat" id="chat"></div>

  <div class="bottom">

    <div class="status" id="status">
      🎤 Press microphone and answer
    </div>

    <div class="mic-area">
      <div class="mic" id="micBtn">🎤</div>
    </div>

    <div class="result" id="result"></div>

    <div class="score" id="score">
      Pronunciation Score: --
    </div>

    <div class="controls">
      <button class="show-btn" onclick="showAnswer()">
        Show Answer
      </button>

      <button class="next-btn" onclick="nextConversation()">
        Next
      </button>
    </div>

  </div>

</div>

<script>

const conversations = [
  {
    speaker:"A",
    en:"Where are you from?",
    id:"Kamu dari mana?",
    answers:["where are you from","from where"]
  },

  {
    speaker:"B",
    en:"Korea, but I live in Vietnam.",
    id:"Korea, tapi aku tinggal di Vietnam.",
    answers:["korea","i am from korea"]
  },

  {
    speaker:"A",
    en:"Why are you living in Vietnam?",
    id:"Kenapa kamu tinggal di Vietnam?",
    answers:["my family lives here"]
  },

  {
    speaker:"B",
    en:"My family lives here.",
    id:"Keluargaku tinggal di sini.",
    answers:["oh i see","nice"]
  },

  {
    speaker:"A",
    en:"Do you have a boyfriend?",
    id:"Kamu punya pacar?",
    answers:["no i dont","no"]
  },

  {
    speaker:"B",
    en:"No, I don’t.",
    id:"Tidak, aku tidak punya.",
    answers:["you look like suzy"]
  },

  {
    speaker:"A",
    en:"You look like Suzy.",
    id:"Kamu mirip Suzy.",
    answers:["really","wow"]
  },

  {
    speaker:"B",
    en:"Really?",
    id:"Benarkah?",
    answers:["yeah like a korean singer"]
  },

  {
    speaker:"A",
    en:"Yeah, like a Korean singer.",
    id:"Iya, seperti penyanyi Korea.",
    answers:["thank you","haha"]
  },

  {
    speaker:"B",
    en:"My name is Mia.",
    id:"Namaku Mia.",
    answers:["nice name","beautiful name"]
  },

  {
    speaker:"A",
    en:"Teach me some Korean.",
    id:"Ajari aku bahasa Korea.",
    answers:["saranghae means i love you"]
  },

  {
    speaker:"B",
    en:"Saranghae means I love you.",
    id:"Saranghae artinya Aku cinta kamu.",
    answers:["what about mianhae"]
  },

  {
    speaker:"A",
    en:"What about Mianhae?",
    id:"Kalau Mianhae?",
    answers:["it means sorry"]
  },

  {
    speaker:"B",
    en:"It means Sorry.",
    id:"Artinya Maaf.",
    answers:["so if i say i love you you say sorry"]
  },

  {
    speaker:"A",
    en:"So if I say I love you, you say sorry?",
    id:"Jadi kalau aku bilang aku cinta kamu, kamu bilang maaf?",
    answers:["bad boy","haha"]
  },

  {
    speaker:"B",
    en:"Bad boy.",
    id:"Cowok nakal.",
    answers:["sorry","just kidding"]
  },

  {
    speaker:"A",
    en:"Can you sing a Korean song?",
    id:"Bisa nyanyi lagu Korea?",
    answers:["sure","okay"]
  },

  {
    speaker:"B",
    en:"Sure.",
    id:"Tentu.",
    answers:["wow","nice"]
  },

  {
    speaker:"A",
    en:"Did you meet interesting people here?",
    id:"Kamu ketemu orang menarik di sini?",
    answers:["most people are weird"]
  },

  {
    speaker:"B",
    en:"Most people are weird.",
    id:"Kebanyakan orang aneh.",
    answers:["but i am different right"]
  },

  {
    speaker:"A",
    en:"But I’m different, right?",
    id:"Tapi aku beda, kan?",
    answers:["maybe a little"]
  },

  {
    speaker:"B",
    en:"Maybe a little.",
    id:"Mungkin sedikit.",
    answers:["i will take that as a compliment"]
  },

  {
    speaker:"A",
    en:"You look like a hot teacher.",
    id:"Kamu terlihat seperti guru yang cantik.",
    answers:["stop it","haha"]
  },

  {
    speaker:"B",
    en:"Stop it.",
    id:"Sudahlah.",
    answers:["okay okay"]
  },

  {
    speaker:"A",
    en:"We should make our own K-drama together.",
    id:"Kita harus bikin drama Korea kita sendiri.",
    answers:["you are funny"]
  },

  {
    speaker:"B",
    en:"You’re funny.",
    id:"Kamu lucu.",
    answers:["thank you"]
  },

  {
    speaker:"A",
    en:"What’s your favorite number?",
    id:"Angka favoritmu apa?",
    answers:["six or seven"]
  },

  {
    speaker:"B",
    en:"Six or seven.",
    id:"Enam atau tujuh.",
    answers:["mine is sixty nine"]
  },

  {
    speaker:"A",
    en:"Mine is sixty-nine.",
    id:"Punyaku enam puluh sembilan.",
    answers:["you make me embarrassed"]
  },

  {
    speaker:"B",
    en:"You make me embarrassed.",
    id:"Kamu bikin aku malu.",
    answers:["sorry haha"]
  },

  {
    speaker:"A",
    en:"Have a good night, Mia.",
    id:"Selamat malam, Mia.",
    answers:["it was nice talking to you"]
  },

  {
    speaker:"B",
    en:"It was nice talking to you.",
    id:"Senang ngobrol denganmu.",
    answers:["this is not the end we should talk again"]
  },

  {
    speaker:"A",
    en:"This isn’t the end. We should talk again.",
    id:"Ini bukan akhir. Kita harus ngobrol lagi.",
    answers:["sure see you soon"]
  },

  {
    speaker:"B",
    en:"Sure, see you soon.",
    id:"Tentu, sampai jumpa lagi.",
    answers:["bye","goodbye"]
  }
];

let current = 0;

const chat = document.getElementById("chat");

const micBtn = document.getElementById("micBtn");

const result = document.getElementById("result");

const score = document.getElementById("score");

const statusText = document.getElementById("status");

function addMessage(data){

  const div = document.createElement("div");

  div.className =
    data.speaker === "A"
    ? "message ai"
    : "message user";

  div.innerHTML = `
    <strong>${data.speaker}</strong><br>
    ${data.en}

    <div class="translation">
      ${data.id}
    </div>

    <div class="answer-box">
      <div class="answer-title">
        ✅ Answer Key:
      </div>
      <div class="answer-content" style="display:none">
        ${data.answers.join("<br>")}
      </div>
    </div>
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function loadConversation(){

  if(current >= conversations.length){

    statusText.innerHTML =
      "🎉 Training Complete!";

    result.innerHTML =
      "Amazing job!";

    speak("Training complete");

    return;
  }

  const data = conversations[current];

  addMessage(data);

  speak(data.en);

}

function speak(text){

  const speech =
    new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";

  speech.rate = 1;

  speechSynthesis.speak(speech);

}

function showAnswer(){

  const contents =
    document.querySelectorAll(".answer-content");

  if(contents.length > 0){

    contents[contents.length - 1]
      .style.display = "block";

  }

}

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

const recognition =
  new SpeechRecognition();

recognition.lang = "en-US";

recognition.continuous = false;

recognition.interimResults = false;

micBtn.onclick = () => {

  micBtn.classList.add("active");

  result.innerHTML = "🎧 Listening...";

  recognition.start();

};

recognition.onresult = (event) => {

  micBtn.classList.remove("active");

  const transcript =
    event.results[0][0].transcript.toLowerCase();

  result.innerHTML =
    `🗣 You said: ${transcript}`;

  checkAnswer(transcript);

};

recognition.onerror = () => {

  micBtn.classList.remove("active");

  result.innerHTML =
    "❌ Microphone error";

};

function checkAnswer(userText){

  const answers =
    conversations[current].answers;

  let matched = false;

  answers.forEach(answer => {

    if(userText.includes(answer)){

      matched = true;

    }

  });

  if(matched){

    score.innerHTML =
      "⭐ Pronunciation Score: 92%";

    statusText.innerHTML =
      "✅ Excellent Answer!";

    speak("Excellent");

  }else{

    score.innerHTML =
      "⭐ Pronunciation Score: 45%";

    statusText.innerHTML =
      "😅 Try Again";

    speak("Try again");

  }

}

function nextConversation(){

  current++;

  loadConversation();

}

loadConversation();

</script>

</body>
</html>
