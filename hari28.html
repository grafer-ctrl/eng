<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Latihan Bicara Ala Ome TV</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:550px;
  background:#111827;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.header{
  background:#1e293b;
  padding:20px;
  text-align:center;
}

.header h1{
  font-size:26px;
}

.header p{
  color:#94a3b8;
  margin-top:5px;
}

.chat{
  height:500px;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.message{
  max-width:85%;
  padding:15px;
  border-radius:18px;
  line-height:1.5;
  animation:fade .3s ease;
}

.ai{
  align-self:flex-start;
  background:#2563eb;
}

.user{
  align-self:flex-end;
  background:#374151;
}

.translation{
  margin-top:8px;
  font-size:13px;
  color:#d1d5db;
}

.answer-box{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  font-size:14px;
}

.answer-title{
  color:#facc15;
  margin-bottom:5px;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.bottom{
  background:#1e293b;
  padding:20px;
}

.status{
  text-align:center;
  margin-bottom:15px;
  color:#facc15;
}

.mic-area{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.mic{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#3b82f6;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
}

.mic.active{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(59,130,246,.7);
  }

  70%{
    transform:scale(1.1);
    box-shadow:0 0 0 30px rgba(59,130,246,0);
  }

  100%{
    transform:scale(1);
  }
}

.result{
  text-align:center;
  min-height:40px;
  margin-bottom:15px;
}

.score{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:20px;
}

.controls{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:15px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-size:15px;
}

.next-btn{
  background:#22c55e;
}

.show-btn{
  background:#f59e0b;
}

</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>Latihan Bicara Ala Ome Tv</h1>
    <p>Practice Real English Conversation, Jawab dengan B Inggris Tanpa Takut Salah, jawab dengan speaker, audio anda akan di evaluasi oleh sistem</p>
  </div>

  <div class="chat" id="chat"></div>

  <div class="bottom">

    <div class="status" id="status">
      🎤 Press microphone and answer
    </div>

    <div class="mic-area">
      <div class="mic" id="micBtn">🎤</div>
    </div>

    <div class="result" id="result"></div>

    <div class="score" id="score">
      Pronunciation Score: --
    </div>

    <div class="controls">
      <button class="show-btn" onclick="showAnswer()">
        Show Answer
      </button>

      <button class="next-btn" onclick="nextConversation()">
        Next
      </button>
    </div>

  </div>

</div>

let current = 0;

const chat = document.getElementById("chat");

const micBtn = document.getElementById("micBtn");

const result = document.getElementById("result");

const score = document.getElementById("score");

const statusText = document.getElementById("status");

function addMessage(data){

  const div = document.createElement("div");

  div.className =
    data.speaker === "A"
    ? "message ai"
    : "message user";

  div.innerHTML = `
    <strong>${data.speaker}</strong><br>
    ${data.en}

    <div class="translation">
      ${data.id}
    </div>

    <div class="answer-box">
      <div class="answer-title">
        ✅ Answer Key:
      </div>
      <div class="answer-content" style="display:none">
        ${data.answers.join("<br>")}
      </div>
    </div>
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function loadConversation(){

  if(current >= conversations.length){

    statusText.innerHTML =
      "🎉 Training Complete!";

    result.innerHTML =
      "Amazing job!";

    speak("Training complete");

    return;
  }

  const data = conversations[current];

  addMessage(data);

  speak(data.en);

}

function speak(text){

  const speech =
    new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";

  speech.rate = 1;

  speechSynthesis.speak(speech);

}

function showAnswer(){

  const contents =
    document.querySelectorAll(".answer-content");

  if(contents.length > 0){

    contents[contents.length - 1]
      .style.display = "block";

  }

}

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

const recognition =
  new SpeechRecognition();

recognition.lang = "en-US";

recognition.continuous = false;

recognition.interimResults = false;

micBtn.onclick = () => {

  micBtn.classList.add("active");

  result.innerHTML = "🎧 Listening...";

  recognition.start();

};

recognition.onresult = (event) => {

  micBtn.classList.remove("active");

  const transcript =
    event.results[0][0].transcript.toLowerCase();

  result.innerHTML =
    `🗣 You said: ${transcript}`;

  checkAnswer(transcript);

};

recognition.onerror = () => {

  micBtn.classList.remove("active");

  result.innerHTML =
    "❌ Microphone error";

};

function checkAnswer(userText){

  const answers =
    conversations[current].answers;

  let matched = false;

  answers.forEach(answer => {

    if(userText.includes(answer)){

      matched = true;

    }

  });

  if(matched){

    score.innerHTML =
      "⭐ Pronunciation Score: 92%";

    statusText.innerHTML =
      "✅ Excellent Answer!";

    speak("Excellent");

  }else{

    score.innerHTML =
      "⭐ Pronunciation Score: 45%";

    statusText.innerHTML =
      "😅 Try Again";

    speak("Try again");

  }

}

function nextConversation(){

  current++;

  loadConversation();

}

loadConversation();
