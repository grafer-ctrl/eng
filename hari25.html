<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OME TV Speaking Trainer</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:550px;
  background:#111827;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.header{
  background:#1e293b;
  padding:20px;
  text-align:center;
}

.header h1{
  font-size:26px;
}

.header p{
  color:#94a3b8;
  margin-top:5px;
}

.chat{
  height:500px;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.message{
  max-width:85%;
  padding:15px;
  border-radius:18px;
  line-height:1.5;
  animation:fade .3s ease;
}

.ai{
  align-self:flex-start;
  background:#2563eb;
}

.user{
  align-self:flex-end;
  background:#374151;
}

.translation{
  margin-top:8px;
  font-size:13px;
  color:#d1d5db;
}

.answer-box{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  font-size:14px;
}

.answer-title{
  color:#facc15;
  margin-bottom:5px;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.bottom{
  background:#1e293b;
  padding:20px;
}

.status{
  text-align:center;
  margin-bottom:15px;
  color:#facc15;
}

.mic-area{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.mic{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#3b82f6;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
}

.mic.active{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(59,130,246,.7);
  }

  70%{
    transform:scale(1.1);
    box-shadow:0 0 0 30px rgba(59,130,246,0);
  }

  100%{
    transform:scale(1);
  }
}

.result{
  text-align:center;
  min-height:40px;
  margin-bottom:15px;
}

.score{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:20px;
}

.controls{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:15px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-size:15px;
}

.next-btn{
  background:#22c55e;
}

.show-btn{
  background:#f59e0b;
}

</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>OME TV Speaking Trainer</h1>
    <p>Practice Real English Conversation</p>
  </div>

  <div class="chat" id="chat"></div>

  <div class="bottom">

    <div class="status" id="status">
      🎤 Press microphone and answer
    </div>

    <div class="mic-area">
      <div class="mic" id="micBtn">🎤</div>
    </div>

    <div class="result" id="result"></div>

    <div class="score" id="score">
      Pronunciation Score: --
    </div>

    <div class="controls">
      <button class="show-btn" onclick="showAnswer()">
        Show Answer
      </button>

      <button class="next-btn" onclick="nextConversation()">
        Next
      </button>
    </div>

  </div>

</div>

<script>

const conversations = [

{
  speaker:"A",
  en:"Hello.",
  id:"Halo.",
  answers:["hello","hi"]
},

{
  speaker:"B",
  en:"Hi.",
  id:"Hai.",
  answers:["hi","hello"]
},

{
  speaker:"A",
  en:"How are you?",
  id:"Apa kabar?",
  answers:[
    "i'm good",
    "i am good",
    "good",
    "fine"
  ]
},

{
  speaker:"B",
  en:"I’m good. How about you?",
  id:"Aku baik. Kamu bagaimana?",
  answers:[
    "i'm good too",
    "i am good too",
    "good too"
  ]
},

{
  speaker:"A",
  en:"What’s your name?",
  id:"Siapa namamu?",
  answers:[
    "my name is dika",
    "i'm dika",
    "dika"
  ]
},

{
  speaker:"B",
  en:"My name is Anna. What’s your name?",
  id:"Namaku Anna. Siapa namamu?",
  answers:[
    "my name is dika",
    "dika"
  ]
},

{
  speaker:"A",
  en:"Where are you from?",
  id:"Kamu dari mana?",
  answers:[
    "i'm from indonesia",
    "i am from indonesia",
    "indonesia"
  ]
},

{
  speaker:"B",
  en:"I’m from Russia.",
  id:"Aku dari Rusia.",
  answers:[
    "wow i'm from indonesia",
    "i'm from indonesia"
  ]
},

{
  speaker:"A",
  en:"How old are you?",
  id:"Umurmu berapa?",
  answers:[
    "i'm twenty years old",
    "i am twenty years old",
    "twenty"
  ]
},

{
  speaker:"B",
  en:"I’m nineteen years old.",
  id:"Aku sembilan belas tahun.",
  answers:[
    "i'm twenty years old",
    "twenty"
  ]
},

{
  speaker:"A",
  en:"Do you like music?",
  id:"Kamu suka musik?",
  answers:[
    "yes i do",
    "yes",
    "i love music"
  ]
},

{
  speaker:"B",
  en:"Yes, I love music.",
  id:"Iya, aku suka musik.",
  answers:[
    "what kind of music do you like"
  ]
},

{
  speaker:"A",
  en:"Do you play games?",
  id:"Kamu main game?",
  answers:[
    "yes sometimes",
    "yes i do",
    "sometimes"
  ]
},

{
  speaker:"B",
  en:"Minecraft and Valorant.",
  id:"Minecraft dan Valorant.",
  answers:[
    "nice i play mobile legends",
    "mobile legends"
  ]
},

{
  speaker:"A",
  en:"What’s your hobby?",
  id:"Hobimu apa?",
  answers:[
    "i like singing",
    "singing"
  ]
},

{
  speaker:"B",
  en:"I like drawing.",
  id:"Aku suka menggambar.",
  answers:[
    "wow that's cool",
    "cool"
  ]
},

{
  speaker:"A",
  en:"Do you like traveling?",
  id:"Kamu suka traveling?",
  answers:[
    "yes i really do",
    "yes"
  ]
},

{
  speaker:"B",
  en:"Japan.",
  id:"Jepang.",
  answers:[
    "japan is beautiful"
  ]
},

{
  speaker:"A",
  en:"What food do you like?",
  id:"Kamu suka makanan apa?",
  answers:[
    "i like pizza and noodles",
    "pizza and noodles"
  ]
},

{
  speaker:"B",
  en:"I like pizza and noodles.",
  id:"Aku suka pizza dan mie.",
  answers:[
    "i love noodles too"
  ]
},

{
  speaker:"A",
  en:"Do you like coffee?",
  id:"Kamu suka kopi?",
  answers:[
    "yes especially iced coffee",
    "yes"
  ]
},

{
  speaker:"B",
  en:"You have a nice smile.",
  id:"Senyummu bagus.",
  answers:[
    "thank you so much",
    "thank you"
  ]
},

{
  speaker:"A",
  en:"Are you shy?",
  id:"Kamu pemalu?",
  answers:[
    "a little bit",
    "yes a little"
  ]
},

{
  speaker:"B",
  en:"Cats.",
  id:"Kucing.",
  answers:[
    "me too cats are cute"
  ]
},

{
  speaker:"A",
  en:"Do you like watching anime?",
  id:"Kamu suka nonton anime?",
  answers:[
    "yes very much",
    "yes"
  ]
},

{
  speaker:"B",
  en:"Demon Slayer.",
  id:"Demon Slayer.",
  answers:[
    "that's awesome",
    "cool"
  ]
},

{
  speaker:"A",
  en:"What’s your dream job?",
  id:"Pekerjaan impianmu apa?",
  answers:[
    "i want to be a teacher",
    "teacher"
  ]
},

{
  speaker:"B",
  en:"Thank you too.",
  id:"Terima kasih juga.",
  answers:[
    "have a nice day"
  ]
}

];

let current = 0;

const chat = document.getElementById("chat");

const micBtn = document.getElementById("micBtn");

const result = document.getElementById("result");

const score = document.getElementById("score");

const statusText = document.getElementById("status");

function addMessage(data){

  const div = document.createElement("div");

  div.className =
    data.speaker === "A"
    ? "message ai"
    : "message user";

  div.innerHTML = `
    <strong>${data.speaker}</strong><br>
    ${data.en}

    <div class="translation">
      ${data.id}
    </div>

    <div class="answer-box">
      <div class="answer-title">
        ✅ Answer Key:
      </div>
      <div class="answer-content" style="display:none">
        ${data.answers.join("<br>")}
      </div>
    </div>
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function loadConversation(){

  if(current >= conversations.length){

    statusText.innerHTML =
      "🎉 Training Complete!";

    result.innerHTML =
      "Amazing job!";

    speak("Training complete");

    return;
  }

  const data = conversations[current];

  addMessage(data);

  speak(data.en);

}

function speak(text){

  const speech =
    new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";

  speech.rate = 1;

  speechSynthesis.speak(speech);

}

function showAnswer(){

  const contents =
    document.querySelectorAll(".answer-content");

  if(contents.length > 0){

    contents[contents.length - 1]
      .style.display = "block";

  }

}

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

const recognition =
  new SpeechRecognition();

recognition.lang = "en-US";

recognition.continuous = false;

recognition.interimResults = false;

micBtn.onclick = () => {

  micBtn.classList.add("active");

  result.innerHTML = "🎧 Listening...";

  recognition.start();

};

recognition.onresult = (event) => {

  micBtn.classList.remove("active");

  const transcript =
    event.results[0][0].transcript.toLowerCase();

  result.innerHTML =
    `🗣 You said: ${transcript}`;

  checkAnswer(transcript);

};

recognition.onerror = () => {

  micBtn.classList.remove("active");

  result.innerHTML =
    "❌ Microphone error";

};

function checkAnswer(userText){

  const answers =
    conversations[current].answers;

  let matched = false;

  answers.forEach(answer => {

    if(userText.includes(answer)){

      matched = true;

    }

  });

  if(matched){

    score.innerHTML =
      "⭐ Pronunciation Score: 92%";

    statusText.innerHTML =
      "✅ Excellent Answer!";

    speak("Excellent");

  }else{

    score.innerHTML =
      "⭐ Pronunciation Score: 45%";

    statusText.innerHTML =
      "😅 Try Again";

    speak("Try again");

  }

}

function nextConversation(){

  current++;

  loadConversation();

}

loadConversation();

</script>

</body>
</html>
