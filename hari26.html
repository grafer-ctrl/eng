<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shadowing Conversation Trainer</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .app{
      width:100%;
      max-width:500px;
      background:#111827;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    .screen{
      display:none;
      padding:25px;
    }

    .active{
      display:block;
    }

    h1{
      font-size:28px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#94a3b8;
      margin-bottom:25px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
    }

    .setting{
      margin-bottom:15px;
    }

    .setting label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
    }

    input[type=range]{
      width:100%;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.02);
    }

    .chat-box{
      display:flex;
      flex-direction:column;
      gap:15px;
      min-height:350px;
      margin-bottom:20px;
    }

    .bubble{
      max-width:80%;
      padding:15px;
      border-radius:15px;
      line-height:1.5;
      animation:fadeIn 0.3s ease;
    }

    .left{
      background:#1e40af;
      align-self:flex-start;
    }

    .right{
      background:#374151;
      align-self:flex-end;
    }

    .speaker{
      font-size:12px;
      opacity:0.7;
      margin-bottom:5px;
    }

    .translation{
      margin-top:8px;
      font-size:14px;
      color:#cbd5e1;
      display:none;
    }

    .controls{
      display:flex;
      gap:10px;
    }

    .controls button{
      flex:1;
    }

    .timer{
      text-align:center;
      margin-bottom:15px;
      color:#facc15;
      font-size:18px;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- SCREEN 1 -->
  <div class="screen active" id="setupScreen">

    <h1>Shadowing Trainer</h1>
    <div class="subtitle">
      Practice real English conversations naturally.
    </div>

    <div class="card">
      <h3>TOPIC</h3>
      <p>Talking About Country</p>
      <br>

      <h3>LEVEL</h3>
      <p>Beginner</p>
    </div>

    <div class="card">

      <div class="setting">
        <label>Voice Speed</label>
        <input type="range" min="0.5" max="1.5" step="0.1" value="1" id="speed">
      </div>

      <div class="setting">
        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.1" value="1" id="volume">
      </div>

      <div class="setting">
        <label>Timer (seconds)</label>
        <input type="range" min="3" max="10" step="1" value="5" id="timerRange">
      </div>

    </div>

    <button onclick="startTraining()">
      START TRAINING
    </button>

  </div>

  <!-- SCREEN 2 -->
  <div class="screen" id="chatScreen">

    <div class="timer" id="timerText">
      Listen and repeat...
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="controls">
      <button onclick="showTranslation()">
        Show Translation
      </button>

      <button onclick="nextConversation()">
        Next
      </button>
    </div>

  </div>

</div>

<script>

const conversations = [
  {
    speaker:"A",
    en:"Gabi, how are you?",
    id:"Gabi, apa kabar?"
  },

  {
    speaker:"B",
    en:"I’ve been great, just super busy lately.",
    id:"Aku baik-baik saja, cuma akhir-akhir ini sangat sibuk."
  },

  {
    speaker:"A",
    en:"Every time I text you, you’re always busy.",
    id:"Setiap kali aku chat kamu, kamu selalu sibuk."
  },

  {
    speaker:"B",
    en:"I only have about 10 minutes before I leave.",
    id:"Aku cuma punya waktu sekitar 10 menit sebelum pergi."
  },

  {
    speaker:"A",
    en:"Why didn’t you tell me? I wanted to surprise you.",
    id:"Kenapa kamu tidak bilang? Aku ingin mengejutkanmu."
  },

  {
    speaker:"B",
    en:"That’s actually sweet.",
    id:"Itu sebenarnya manis."
  },

  {
    speaker:"A",
    en:"Guys, she’s a dance teacher.",
    id:"Guys, dia guru dance."
  },

  {
    speaker:"B",
    en:"Yeah, I’m going to practice soon.",
    id:"Iya, aku sebentar lagi latihan."
  },

  {
    speaker:"A",
    en:"How was your day?",
    id:"Bagaimana harimu?"
  },

  {
    speaker:"B",
    en:"It was okay. I had school and some practice.",
    id:"Lumayan. Aku sekolah dan ada latihan juga."
  },

  {
    speaker:"A",
    en:"You look so beautiful today.",
    id:"Kamu terlihat sangat cantik hari ini."
  },

  {
    speaker:"B",
    en:"Thank you.",
    id:"Terima kasih."
  },

  {
    speaker:"A",
    en:"Did you eat already?",
    id:"Kamu sudah makan?"
  },

  {
    speaker:"B",
    en:"Yeah, but I can’t really eat too much before practice.",
    id:"Iya, tapi aku tidak bisa makan terlalu banyak sebelum latihan."
  },

  {
    speaker:"A",
    en:"How many times do you eat every day?",
    id:"Kamu makan berapa kali sehari?"
  },

  {
    speaker:"B",
    en:"Usually two or three times.",
    id:"Biasanya dua atau tiga kali."
  },

  {
    speaker:"A",
    en:"You look skinnier now.",
    id:"Kamu terlihat lebih kurus sekarang."
  },

  {
    speaker:"B",
    en:"No, trust me, I’m not dieting.",
    id:"Tidak, percaya deh, aku tidak diet."
  },

  {
    speaker:"A",
    en:"How old are you again? Nineteen?",
    id:"Umurmu berapa lagi? Sembilan belas?"
  },

  {
    speaker:"B",
    en:"Yeah, nineteen.",
    id:"Iya, sembilan belas."
  },

  {
    speaker:"A",
    en:"Do you still remember my age?",
    id:"Kamu masih ingat umurku?"
  },

  {
    speaker:"B",
    en:"You lied to me before, so I don’t know anymore.",
    id:"Kamu pernah bohong sebelumnya, jadi aku tidak tahu lagi."
  },

  {
    speaker:"A",
    en:"My nickname is Deion.",
    id:"Nama panggilanku Deion."
  },

  {
    speaker:"B",
    en:"What’s your full name?",
    id:"Siapa nama lengkapmu?"
  },

  {
    speaker:"A",
    en:"My full name is “I’m the only one for you.”",
    id:"Nama lengkapku adalah “Aku satu-satunya untukmu.”"
  },

  {
    speaker:"B",
    en:"Oh my God, that’s cheesy.",
    id:"Ya ampun, itu gombal banget."
  },

  {
    speaker:"A",
    en:"How’s the weather in Poland?",
    id:"Bagaimana cuaca di Polandia?"
  },

  {
    speaker:"B",
    en:"It’s kind of cold now.",
    id:"Sekarang agak dingin."
  },

  {
    speaker:"A",
    en:"I just wanted to talk to you for 10 minutes.",
    id:"Aku cuma ingin ngobrol denganmu selama 10 menit."
  },

  {
    speaker:"B",
    en:"I appreciate that.",
    id:"Aku menghargai itu."
  },

  {
    speaker:"A",
    en:"Thank you for making time for me.",
    id:"Terima kasih sudah meluangkan waktu untukku."
  },

  {
    speaker:"B",
    en:"Of course.",
    id:"Tentu saja."
  },

  {
    speaker:"A",
    en:"Be careful on your way.",
    id:"Hati-hati di jalan ya."
  },

  {
    speaker:"B",
    en:"You too. Talk to you soon.",
    id:"Kamu juga. Sampai ngobrol lagi nanti."
  }
];

let current = 0;

const chatBox = document.getElementById("chatBox");

function startTraining(){

  document.getElementById("setupScreen")
    .classList.remove("active");

  document.getElementById("chatScreen")
    .classList.add("active");

  showConversation();

}

function showConversation(){

  if(current >= conversations.length){

    document.getElementById("timerText")
      .innerHTML = "🎉 Training Complete!";

    return;
  }

  const data = conversations[current];

  const bubble = document.createElement("div");

  bubble.className =
    "bubble " + (data.speaker === "A" ? "left" : "right");

  bubble.innerHTML = `

    <div class="speaker">
      ${data.speaker}
    </div>

    <div class="english">
      ${data.en}
    </div>

    <div class="translation">
      ${data.id}
    </div>

  `;

  chatBox.appendChild(bubble);

  chatBox.scrollTop = chatBox.scrollHeight;

  speakText(data.en);

  startTimer();

}

function showTranslation(){

  const translations =
    document.querySelectorAll(".translation");

  if(translations.length > 0){

    translations[translations.length - 1]
      .style.display = "block";

  }

}

function nextConversation(){

  current++;

  showConversation();

}

function speakText(text){

  const speech =
    new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";

  speech.rate =
    document.getElementById("speed").value;

  speech.volume =
    document.getElementById("volume").value;

  speechSynthesis.speak(speech);

}

function startTimer(){

  let time =
    document.getElementById("timerRange").value;

  const timerText =
    document.getElementById("timerText");

  timerText.innerHTML =
    `🎤 Repeat in ${time}s`;

  const countdown = setInterval(() => {

    time--;

    timerText.innerHTML =
      `🎤 Repeat in ${time}s`;

    if(time <= 0){

      clearInterval(countdown);

      timerText.innerHTML =
        "✅ Good! Continue...";

    }

  },1000);

}

</script>

</body>
</html>
