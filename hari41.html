<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Speaking Simulator</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:500px;
  background:#111827;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.header{
  padding:20px;
  background:#1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.level{
  background:#2563eb;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
}

.character{
  text-align:center;
  padding:25px 20px 10px;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:linear-gradient(45deg,#60a5fa,#8b5cf6);
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.character h2{
  margin-top:15px;
}

.character p{
  color:#94a3b8;
  margin-top:5px;
}

.chat{
  padding:20px;
  height:350px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.message{
  max-width:80%;
  padding:15px;
  border-radius:18px;
  line-height:1.5;
  animation:fade .3s ease;
}

.ai{
  background:#1d4ed8;
  align-self:flex-start;
}

.user{
  background:#374151;
  align-self:flex-end;
}

.translation{
  margin-top:8px;
  font-size:13px;
  color:#cbd5e1;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.bottom{
  padding:20px;
  background:#1e293b;
}

.question{
  margin-bottom:15px;
  color:#facc15;
  text-align:center;
}

.mic-area{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.mic{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#2563eb;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
}

.mic.active{
  animation:listening 1s infinite;
}

@keyframes listening{
  0%{
    transform:scale(1);
    box-shadow:0 0 0 0 rgba(59,130,246,.6);
  }

  70%{
    transform:scale(1.1);
    box-shadow:0 0 0 25px rgba(59,130,246,0);
  }

  100%{
    transform:scale(1);
  }
}

.result{
  text-align:center;
  margin-bottom:15px;
  min-height:40px;
}

.score{
  text-align:center;
  font-size:14px;
  color:#94a3b8;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="title">AI Speaking Simulator</div>
    <div class="level">BEGINNER</div>
  </div>

  <div class="character">

    <div class="avatar">
      🇰🇷
    </div>

    <h2>Yuna</h2>
    <p>Talk with Yuna from Korea</p>

  </div>

  <div class="chat" id="chat"></div>

  <div class="bottom">

    <div class="question" id="questionText">
      Press microphone and answer
    </div>

    <div class="mic-area">

      <div class="mic" id="micBtn">
        🎤
      </div>

    </div>

    <div class="result" id="result"></div>

    <div class="score" id="score">
      Pronunciation Score: --
    </div>

    <br>

    <button onclick="nextQuestion()">
      NEXT QUESTION
    </button>

  </div>

</div>

<script>

const chat = document.getElementById("chat");

const result = document.getElementById("result");

const score = document.getElementById("score");

const micBtn = document.getElementById("micBtn");

const questionText = document.getElementById("questionText");

const conversations = [

{
  question:"Where are you from?",
  translation:"Kamu dari mana?",
  answers:[
    "i am from indonesia",
    "i'm from indonesia",
    "indonesia"
  ]
},

{
  question:"Why are you living in Vietnam?",
  translation:"Kenapa kamu tinggal di Vietnam?",
  answers:[
    "my family lives here",
    "because my family lives here"
  ]
},

{
  question:"Do you have a boyfriend?",
  translation:"Kamu punya pacar?",
  answers:[
    "no i don't",
    "no",
    "i don't"
  ]
}

];

let current = 0;

function addAIMessage(text, translation){

  const div = document.createElement("div");

  div.className = "message ai";

  div.innerHTML = `
    <strong>Yuna</strong><br>
    ${text}
    <div class="translation">
      ${translation}
    </div>
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function addUserMessage(text){

  const div = document.createElement("div");

  div.className = "message user";

  div.innerHTML = `
    <strong>You</strong><br>
    ${text}
  `;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function speak(text){

  const speech = new SpeechSynthesisUtterance(text);

  speech.lang = "en-US";

  speech.rate = 1;

  speechSynthesis.speak(speech);

}

function loadQuestion(){

  const data = conversations[current];

  addAIMessage(data.question, data.translation);

  speak(data.question);

  questionText.innerHTML =
    "🎤 Answer Yuna in English";

}

loadQuestion();

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

const recognition =
  new SpeechRecognition();

recognition.lang = "en-US";

recognition.continuous = false;

recognition.interimResults = false;

micBtn.onclick = () => {

  micBtn.classList.add("active");

  result.innerHTML = "🎧 Listening...";

  recognition.start();

};

recognition.onresult = (event) => {

  micBtn.classList.remove("active");

  const transcript =
    event.results[0][0].transcript.toLowerCase();

  addUserMessage(transcript);

  checkAnswer(transcript);

};

recognition.onerror = () => {

  micBtn.classList.remove("active");

  result.innerHTML =
    "❌ Microphone error";

};

function checkAnswer(userAnswer){

  const correctAnswers =
    conversations[current].answers;

  let matched = false;

  correctAnswers.forEach(answer => {

    if(userAnswer.includes(answer)){

      matched = true;

    }

  });

  if(matched){

    result.innerHTML =
      "✅ Great job!";

    score.innerHTML =
      "Pronunciation Score: 92%";

    speak("Great job!");

  }else{

    result.innerHTML =
      "😅 Try again!";

    score.innerHTML =
      "Pronunciation Score: 45%";

    speak("Try again");

  }

}

function nextQuestion(){

  current++;

  if(current >= conversations.length){

    result.innerHTML =
      "🎉 Conversation Complete!";

    questionText.innerHTML =
      "You finished the training";

    speak("Congratulations");

    return;
  }

  loadQuestion();

}

</script>

</body>
</html>
